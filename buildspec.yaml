version: 0.2

env:
  variables:
    IMAGE_REPO_NAME: my_first_repo

phases:
  pre_build:
    commands:
      - echo "Logging in to Amazon ECR..."

      # Get AWS account and region
      - ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - AWS_REGION=$AWS_DEFAULT_REGION
      - REPOSITORY_URI=$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$IMAGE_REPO_NAME

      # Use CodeBuild build number as image version
      - IMAGE_TAG=$CODEBUILD_BUILD_NUMBER

      - echo "Image Tag: $IMAGE_TAG"
      - echo "Repository URI: $REPOSITORY_URI"

      # Login to Amazon ECR
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com

      # Create repository if it doesn't exist
      - aws ecr describe-repositories --repository-names $IMAGE_REPO_NAME || aws ecr create-repository --repository-name $IMAGE_REPO_NAME

  build:
    commands:
      - echo "Building Docker image..."

      # Build image
      - docker build -t $IMAGE_REPO_NAME:$IMAGE_TAG .

      # Tag versioned image
      - docker tag $IMAGE_REPO_NAME:$IMAGE_TAG $REPOSITORY_URI:$IMAGE_TAG

      # Tag latest image
      - docker tag $IMAGE_REPO_NAME:$IMAGE_TAG $REPOSITORY_URI:latest

  post_build:
    commands:
      - echo "Pushing Docker images..."

      # Push versioned image
      - docker push $REPOSITORY_URI:$IMAGE_TAG

      # Push latest image
      - docker push $REPOSITORY_URI:latest

      # Create ECS image definitions file
      - printf '[{"name":"frontend","imageUri":"%s"}]' $REPOSITORY_URI:$IMAGE_TAG > imagedefinitions.json

      - echo "Build completed successfully."

artifacts:
  files:
    - imagedefinitions.json
